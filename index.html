<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>idid 노래 소트</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- 시작 화면 -->
  <div id="startScreen">
    <h1>idid 노래 소트</h1>

    <div class="option">
      <label>
        <input type="checkbox" id="debutToggle" />
        Debut's Plan 곡도 함께 소트하기
      </label>
    </div>

    <button id="startBtn">Start</button>
    <div class="credit">@pshcomplex</div>
  </div>

  <!-- 소트 화면 -->
  <div id="sortScreen" style="display:none;">
    <div id="topBar">
      <div id="title">idid 노래 소트</div>
    </div>

    <!-- 비교 영역 -->
    <div id="song-container">
      <div class="song leftSong">
        <img id="leftThumb" alt="left thumbnail" />
        <button id="left"></button>
      </div>

      <div class="middle">
        <button id="tie">둘 다 좋음</button>
        <div id="vs">VS</div>
        <button id="undo">이전 선택 취소</button>
      </div>

      <div class="song rightSong">
        <img id="rightThumb" alt="right thumbnail" />
        <button id="right"></button>
      </div>
    </div>

    <!-- ✅ 모바일에서만 사용: A 아래/B 아래 “분리된 줄” -->
    <div id="auxRow" aria-hidden="true">
      <div id="auxLeft"></div>
      <div class="auxSpacer"></div>
      <div id="auxRight"></div>
    </div>

    <!-- 결과 -->
    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
